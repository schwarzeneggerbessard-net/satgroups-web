<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATGROUP'S.LLC | Home</title>
    
    <style>
        /* 1. Les fondations de la page */
        body {
            font-family: Arial, sans-serif; /* Une police de texte propre */
            margin: 0; /* Enlève les marges invisibles du navigateur */
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Règle magique : force la page à faire 100% de la hauteur de l'écran */
        }

        /* 2. Le Header (En-tête pour le Logo) */
        header {
            background-color: #2c3e50; /* Un fond bleu nuit élégant */
            color: white; /* Le texte en blanc */
            padding: 20px 40px; /* De l'espace à l'intérieur */
        }

        .logo {
            font-weight: bold; /* En gras */
            text-transform: uppercase; /* Force les MAJUSCULES */
            text-align: left; /* Aligné à gauche */
            font-size: 24px; /* Taille du texte */
        }

        /* 3. Le contenu au milieu */
        main {
            flex: 1; /* Règle magique 2 : Pousse le Footer tout en bas */
            padding: 50px;
            text-align: center;
        }

        /* 4. Le Footer (Pied de page pour le Copyright) */
        footer {
            background-color: #f4f4f4; /* Un fond gris très clair */
            color: #333; /* Texte gris foncé */
            text-align: center; /* Aligné au centre */
            padding: 40px 0; /* Espace en haut et en bas du copyright */
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">SATGROUP'S.LLC</div>
    </header>

    <main>
        <h2>Welcome to the Main Page</h2>
        <p>This is where your projects and text will go.</p>
        
        <div style="height: 800px;"></div>
    </main>

    <footer>
        <p>© 2026 Satgroup-s. llc - All rights reserved.</p>
    </footer>

</body>
</html>
